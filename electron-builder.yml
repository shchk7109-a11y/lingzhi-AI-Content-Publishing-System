appId: com.lingzhi.publisher
productName: 灵芝水铺发布系统
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: 灵芝水铺发布系统
extraResources:
  - from: resources/
    to: resources/
